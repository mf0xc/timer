<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0c0c12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *; img-src 'self' data: blob:; media-src *;">
  <title>حمودي & فاطمة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c12;
      --card: rgba(255, 255, 255, 0.025);
      --border: rgba(255, 255, 255, 0.06);
      --cream: #f0e6d8;
      --muted: rgba(240, 230, 216, 0.45);
      --rose: #c9a9a6;
      --blue: #a8b8d8;
      --gold: #d4af37;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      overscroll-behavior: none;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      touch-action: none;
      font-family: 'Tajawal', system-ui, sans-serif;
      background: var(--bg);
      color: var(--cream);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(201, 169, 166, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168, 184, 216, 0.06) 0%, transparent 50%),
        linear-gradient(180deg, #0c0c12 0%, #111118 100%);
    }

    .app-shell {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      perspective: 1200px;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 340px;
      background: var(--card);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 32px 24px;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
      transition: transform 0.2s ease-out;
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 32px;
      background: radial-gradient(
        circle at calc(50% + var(--hx, 0px)) calc(50% + var(--hy, 0px)),
        rgba(255, 255, 255, 0.08) 0%,
        transparent 50%
      );
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: overlay;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      position: relative;
      z-index: 3;
      transform: translateZ(20px);
    }

    .profile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      position: relative;
      overflow: hidden;
    }

    .avatar-hamoudi {
      background: linear-gradient(145deg, #1a1f2e, #2d3a5c);
      border: 1.5px solid rgba(168, 184, 216, 0.3);
      color: var(--blue);
      box-shadow: 0 4px 20px rgba(168, 184, 216, 0.15);
    }

    .avatar-fatima {
      background: linear-gradient(145deg, #2e1a1a, #5c3a3a);
      border: 1.5px solid rgba(201, 169, 166, 0.3);
      color: var(--rose);
      box-shadow: 0 4px 20px rgba(201, 169, 166, 0.15);
    }

    .avatar-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--cream);
      opacity: 0.85;
      letter-spacing: 0.5px;
    }

    .heart-wrap {
      transform: translateZ(30px);
      filter: drop-shadow(0 0 8px rgba(201, 169, 166, 0.3));
    }

    .heart-3d {
      width: 44px;
      height: 44px;
      animation: heartBeat 2s ease-in-out infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.12); }
      30% { transform: scale(1); }
    }

    .date-block {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      z-index: 3;
      transform: translateZ(15px);
    }

    .date-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .counter {
      text-align: center;
      position: relative;
      z-index: 3;
      transform: translateZ(15px);
    }

    .days-wrap {
      margin-bottom: 16px;
    }

    .days-num {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
    }

    .days-label {
      font-size: 16px;
      font-weight: 600;
      color: var(--muted);
      margin-top: 4px;
    }

    .time-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 14px 4px;
      text-align: center;
    }

    .time-val {
      font-size: 26px;
      font-weight: 700;
      color: var(--cream);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .time-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    .month-year {
      text-align: center;
      margin-top: 16px;
      position: relative;
      z-index: 3;
    }

    .month-year span {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      padding: 6px 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .perm-layer {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      background: rgba(12, 12, 18, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .perm-layer.dismissed {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .perm-title {
      font-size: 22px;
      font-weight: 800;
      color: var(--cream);
      margin-bottom: 8px;
    }

    .perm-desc {
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 32px;
      line-height: 1.6;
      max-width: 260px;
    }

    .perm-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--cream);
      font-family: 'Tajawal', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 36px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .perm-btn:active {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(0.97);
    }

    @media (max-height: 700px) {
      .card { padding: 24px 20px; border-radius: 28px; }
      .avatar { width: 56px; height: 56px; font-size: 22px; }
      .heart-3d { width: 38px; height: 38px; }
      .days-num { font-size: 60px; }
      .time-val { font-size: 22px; }
      .header { margin-bottom: 20px; }
    }

    @media (max-width: 340px) {
      .card { max-width: 300px; padding: 22px 18px; }
      .days-num { font-size: 56px; }
    }
  </style>
</head>
<body>

  <div class="bg-layer"></div>

  <div class="perm-layer" id="permLayer">
    <div class="perm-title">تأثير ثلاثي الأبعاد</div>
    <div class="perm-desc">امتلك التجربة الكاملة مع تأثير الإمالة التفاعلي عبر حركة الهاتف.</div>
    <button class="perm-btn" id="permBtn">تمكين</button>
  </div>

  <div class="app-shell">
    <div class="card" id="mainCard">
      <div class="header">
        <div class="profile">
          <div class="avatar avatar-hamoudi">ح</div>
          <div class="avatar-name">حمودي</div>
        </div>

        <div class="heart-wrap">
          <svg class="heart-3d" viewBox="0 0 24 24" fill="none">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
                  fill="#c9a9a6" stroke="rgba(201,169,166,0.4)" stroke-width="0.5"/>
          </svg>
        </div>

        <div class="profile">
          <div class="avatar avatar-fatima">ف</div>
          <div class="avatar-name">فاطمة</div>
        </div>
      </div>

      <div class="date-block">
        <div class="date-text" id="dateText">15 يونيو 2026</div>
      </div>

      <div class="counter">
        <div class="days-wrap">
          <div class="days-num" id="daysNum">0</div>
          <div class="days-label" id="daysLabel">يوم</div>
        </div>

        <div class="time-row">
          <div class="time-box">
            <div class="time-val" id="hoursVal">00</div>
            <div class="time-lbl">ساعة</div>
          </div>
          <div class="time-box">
            <div class="time-val" id="minutesVal">00</div>
            <div class="time-lbl">دقيقة</div>
          </div>
          <div class="time-box">
            <div class="time-val" id="secondsVal">00</div>
            <div class="time-lbl">ثانية</div>
          </div>
        </div>
      </div>

      <div class="month-year">
        <span id="monthYear">يونيو 2026</span>
      </div>
    </div>
  </div>

  <script src="cordova.js"></script>
  <script>
    (function() {
      'use strict';

      window.onerror = function(msg, url, line) {
        console.error('Error:', msg, line);
      };

      const CONFESSION_DATE = new Date('2026-06-15T23:54:00+03:00');
      const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

      const mainCard = document.getElementById('mainCard');
      const permLayer = document.getElementById('permLayer');
      const permBtn = document.getElementById('permBtn');

      const daysNum = document.getElementById('daysNum');
      const daysLabel = document.getElementById('daysLabel');
      const hoursVal = document.getElementById('hoursVal');
      const minutesVal = document.getElementById('minutesVal');
      const secondsVal = document.getElementById('secondsVal');
      const dateText = document.getElementById('dateText');
      const monthYear = document.getElementById('monthYear');

      dateText.textContent = '15 يونيو 2026';
      monthYear.textContent = 'يونيو 2026';

      function getDayLabel(n) {
        if (n === 1) return 'يوم';
        if (n === 2) return 'يومان';
        if (n >= 3 && n <= 10) return 'أيام';
        return 'يوماً';
      }

      function tick() {
        try {
          const now = new Date();
          const diff = now - CONFESSION_DATE;
          const absDiff = Math.abs(diff);

          const days = Math.floor(absDiff / 86400000);
          const hours = Math.floor((absDiff % 86400000) / 3600000);
          const minutes = Math.floor((absDiff % 3600000) / 60000);
          const seconds = Math.floor((absDiff % 60000) / 1000);

          daysNum.textContent = days;
          daysLabel.textContent = getDayLabel(days);
          hoursVal.textContent = hours.toString().padStart(2, '0');
          minutesVal.textContent = minutes.toString().padStart(2, '0');
          secondsVal.textContent = seconds.toString().padStart(2, '0');
        } catch (e) {}
      }

      setInterval(tick, 1000);
      tick();

      let tiltActive = false;

      function applyTilt(beta, gamma) {
        var maxTilt = 10;
        var rx = Math.max(-maxTilt, Math.min(maxTilt, (beta || 0) * 0.35));
        var ry = Math.max(-maxTilt, Math.min(maxTilt, (gamma || 0) * 0.35));

        mainCard.style.setProperty('--rx', (-rx) + 'deg');
        mainCard.style.setProperty('--ry', ry + 'deg');
        mainCard.style.setProperty('--hx', ((gamma || 0) * 2) + 'px');
        mainCard.style.setProperty('--hy', ((beta || 0) * 2) + 'px');
      }

      function onDeviceOrientation(e) {
        if (!tiltActive) return;
        applyTilt(e.beta, e.gamma);
      }

      function enableTilt() {
        tiltActive = true;
        permLayer.classList.add('dismissed');
        window.addEventListener('deviceorientation', onDeviceOrientation);
      }

      function requestPerm() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(function(res) { if (res === 'granted') enableTilt(); })
            .catch(function() { enableTilt(); });
        } else {
          enableTilt();
        }
      }

      permBtn.addEventListener('click', requestPerm);

      var isTouch = window.matchMedia('(pointer: coarse)').matches;
      if (isTouch) {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          permLayer.classList.remove('dismissed');
        } else {
          enableTilt();
        }
      } else {
        permLayer.classList.add('dismissed');
        document.addEventListener('mousemove', function(e) {
          var x = (e.clientX / window.innerWidth - 0.5) * 2;
          var y = (e.clientY / window.innerHeight - 0.5) * 2;
          applyTilt(y * 12, x * 12);
        });
      }

      document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
      document.addEventListener('gesturechange', function(e) { e.preventDefault(); });
      document.addEventListener('gestureend', function(e) { e.preventDefault(); });

      function onDeviceReady() {
        console.log('ready');
        document.body.classList.add('ready');
      }

      if (window.cordova) {
        document.addEventListener('deviceready', onDeviceReady, false);
      } else {
        onDeviceReady();
      }

      setTimeout(function() {
        if (!document.body.classList.contains('ready')) onDeviceReady();
      }, 4000);

    })();
  </script>
</body>
</html>
